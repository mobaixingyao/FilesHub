name = "fileshub"
main = "src/index.js"
compatibility_date = "2024-09-23"

# 静态环境变量（非敏感信息）
# 敏感信息请使用 `wrangler secret put` 设置
[vars]
# GITHUB_OWNER = "your-github-username"(输入你的github用户名)
# GITHUB_REPO = "your-file-storage-repo"(输入你的仓库名)
GITHUB_BRANCH = "main"
SITE_TITLE = "FilesHub"
# 是否允许公开访问文件列表 API（下载 /raw/* 始终公开）
PUBLIC_LIST = "false"

# 以下密钥请通过 wrangler secret 命令设置，不要写在此文件中：
# wrangler secret put GITHUB_TOKEN   → GitHub Personal Access Token (需要 repo 权限)
# wrangler secret put AUTH_TOKEN     → 管理操作（上传/删除）的认证令牌
